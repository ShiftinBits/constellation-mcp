name: Publish
permissions:
  id-token: write
  contents: write
on:
  release:
    types: [published]
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Update version from release tag
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if [ "$CURRENT_VERSION" = "$VERSION" ]; then
            echo "Version already matches ($VERSION), skipping bump."
            exit 0
          fi
          npm version "$VERSION" --no-git-tag-version
          jq --tab --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp && mv server.tmp server.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json server.json
          git commit -m "chore: bumped version to $VERSION for release"
          git push origin main
      - name: Install Dependencies ⤵️
        run: |
          npm update @constellationdev/types
          npm ci
      - name: Build
        run: npm run build
      - name: Publish
        run: npm publish --provenance
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Authenticate to MCP Registry
        env:
          MCP_PRIVATE_KEY: ${{ secrets.MCP_REGISTRY_KEY }}
        run: ./mcp-publisher login dns --domain shiftinbits.com --private-key "$MCP_PRIVATE_KEY"
      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
